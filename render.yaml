services:
  - type: web
    name: newscast-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENABLE_PRELOAD
        value: "1"
      - key: PRELOAD_TZ
        value: Asia/Shanghai
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TTS_PROVIDER
        value: mimo
      - key: MIMO_TTS_API_KEY
        sync: false
